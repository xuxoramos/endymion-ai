version: '3.8'

services:
  # SQL Server for transactional data
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cattlesaas-sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong!Passw0rd
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P YourStrong!Passw0rd -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cattlesaas-network

  # MinIO for local S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: cattlesaas-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - cattlesaas-network

  # MinIO Client - Create buckets on startup
  minio-client:
    image: minio/mc:latest
    container_name: cattlesaas-minio-client
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set localminio http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing localminio/bronze;
      mc mb --ignore-existing localminio/silver;
      mc mb --ignore-existing localminio/gold;
      mc mb --ignore-existing localminio/raw-data;
      echo 'MinIO buckets created successfully';
      exit 0;
      "
    networks:
      - cattlesaas-network

volumes:
  sqlserver-data:
    driver: local
  minio-data:
    driver: local

networks:
  cattlesaas-network:
    driver: bridge
